version: "3.8"

services:
  # 1. Giữ nguyên dịch vụ Postgres hiện tại của bạn ở đây
  postgres:
    image: postgres:15 # Hoặc phiên bản bạn đang dùng
    # ... các cấu hình cũ của bạn (ports, environment, v.v.) giữ nguyên nhé ...

  # 2. Dán thêm cục cấu hình Kafka này vào ngay phía dưới
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: social_media_kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092"
      KAFKA_OFFERS_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:29093"
      KAFKA_LISTENERS: "PLAINTEXT://0.0.0.0:29092,CONTROLLER://0.0.0.0:29093,PLAINTEXT_HOST://0.0.0.0:9092"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_LOG_DIRS: "/tmp/kraft-combined-logs"
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
